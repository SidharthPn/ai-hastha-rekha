<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
body{background:#0d0820;margin:0;overflow:hidden;}
#bird-area { width: 100vw; height: 100vh; position: absolute; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
<div id="bird-area"></div>
<script>
let scene, camera, renderer, parrotRoot, headGroup, lowerBeakGroup, wingL, wingR;
let t = 0; let animState = 0; let stateTimer = 0;
const stateDurations = [1.5, 0.8, 0.9, 3.0, 1.2];
let clock;

function createFeatherTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 512, 512);
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 500; i++) {
    let x = Math.random() * 512; let y = Math.random() * 512;
    let len = 15 + Math.random() * 25;
    let angle = Math.sin(y * 0.05) * 0.2 + Math.PI / 2;
    ctx.beginPath(); ctx.moveTo(x, y);
    ctx.lineTo(x + Math.cos(angle) * len, y + Math.sin(angle) * len);
    ctx.stroke();
  }
  const texture = new THREE.CanvasTexture(canvas);
  texture.wrapS = THREE.RepeatWrapping; texture.wrapT = THREE.RepeatWrapping;
  texture.repeat.set(3, 4);
  return texture;
}

const container = document.getElementById('bird-area');
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 100);
camera.position.set(0, 0.6, 6.5); 
camera.lookAt(0, -0.2, 0);

renderer = new THREE.WebGLRenderer({alpha: true, antialias:true});
renderer.setSize(container.clientWidth, container.clientHeight);
container.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xfff5ea, 0.6));
const sun = new THREE.DirectionalLight(0xfffdf6, 2.5);
sun.position.set(5, 6, 4); scene.add(sun);

const featherMap = createFeatherTexture();
function cmat(hex, r=0.6, m=0.05, dynamicFeather=false){
  return new THREE.MeshStandardMaterial({
    color: hex, roughness: r, metalness: m, map: dynamicFeather ? featherMap : null
  });
}
const bodyMat   = cmat(0x00b050, 0.75, 0.02, true); 
const headMat   = cmat(0xffcc00, 0.7, 0.02, true);  
const bellyMat  = cmat(0xff9900, 0.7, 0.02, true);   
const wingMat   = cmat(0x0080ff, 0.65, 0.02, true);  
const beakMat   = cmat(0xff2222, 0.35, 0.05); 
const eyeMat    = cmat(0x0c090a, 0.1, 0.0);  
const eyeWMat   = cmat(0xfffbf2, 0.5, 0.0);  
const clawMat   = cmat(0x9fa4a6, 0.6, 0.0);

function mesh(geo, mat){ return new THREE.Mesh(geo, mat); }
function sph(rx, ry, rz){ return new THREE.SphereGeometry(1, 32, 24).applyMatrix4(new THREE.Matrix4().makeScale(rx, ry, rz)); }

parrotRoot = new THREE.Group();
parrotRoot.position.set(0, -0.3, 0); 
parrotRoot.scale.set(1.5, 1.5, 1.5);
parrotRoot.position.y -= 1.0;
scene.add(parrotRoot);

const body = mesh(sph(0.78, 1.05, 0.70), bodyMat); body.position.y = 0.2; parrotRoot.add(body);
const belly = mesh(sph(0.64, 0.72, 0.48), bellyMat); belly.position.set(0, 0.05, 0.26); parrotRoot.add(belly);

headGroup = new THREE.Group(); headGroup.position.set(0, 1.15, 0.1); parrotRoot.add(headGroup);
const head = mesh(sph(0.58, 0.58, 0.54), headMat); headGroup.add(head);

function makeCuteEye(side){
  const eg = new THREE.Group();
  const eyeWhite = mesh(new THREE.SphereGeometry(0.09, 16, 12), eyeWMat);
  const pupil = mesh(new THREE.SphereGeometry(0.062, 16, 12), eyeMat);
  pupil.position.z = 0.042; pupil.scale.set(1, 1.05, 1); 
  eg.add(eyeWhite, pupil);
  eg.position.set(side * 0.33, 0.14, 0.34); eg.rotation.y = side * 0.45; 
  return eg;
}
headGroup.add(makeCuteEye(1), makeCuteEye(-1));

const upperBeakGeo = new THREE.CylinderGeometry(0, 0.14, 0.38, 16);
upperBeakGeo.applyMatrix4(new THREE.Matrix4().makeTranslation(0, 0.19, 0)); 
const upperBeakMesh = mesh(upperBeakGeo, beakMat);
upperBeakMesh.position.set(0, 0.02, 0.38); upperBeakMesh.rotation.x = Math.PI / 2 + 0.35; 
headGroup.add(upperBeakMesh);

lowerBeakGroup = new THREE.Group(); lowerBeakGroup.position.set(0, -0.08, 0.38); headGroup.add(lowerBeakGroup);
const lowerBeakGeo = new THREE.CylinderGeometry(0, 0.11, 0.24, 16);
lowerBeakGeo.applyMatrix4(new THREE.Matrix4().makeTranslation(0, 0.12, 0)); 
lowerBeakGeo.applyMatrix4(new THREE.Matrix4().makeScale(1, 1, 0.6)); 
const lowerBeakMesh = mesh(lowerBeakGeo, beakMat); lowerBeakMesh.rotation.x = Math.PI / 2 - 0.15; 
lowerBeakGroup.add(lowerBeakMesh);

wingL = new THREE.Group(); wingL.position.set(0.74, 0.2, 0); const wlBase = mesh(sph(0.18, 0.65, 0.38), wingMat); wlBase.rotation.z = 0.15; wingL.add(wlBase);
wingR = new THREE.Group(); wingR.position.set(-0.74, 0.2, 0); const wrBase = mesh(sph(0.18, 0.65, 0.38), wingMat); wrBase.rotation.z = -0.15; wingR.add(wrBase);
parrotRoot.add(wingL, wingR);

clock = new THREE.Clock();

function easeInOutQuad(x) { return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2; }

function animateThreeJS() {
  requestAnimationFrame(animateThreeJS);
  const delta = clock.getDelta();
  t += delta; stateTimer += delta;
  if (stateTimer >= stateDurations[animState]) {
    stateTimer = 0; animState = (animState + 1) % stateDurations.length;
  }
  const ep = easeInOutQuad(Math.min(stateTimer / stateDurations[animState], 1));
  switch(animState) {
    case 0:
      parrotRoot.position.set(0, -0.3 + Math.sin(t * 2) * 0.015, 0);
      break;
    case 1:
      parrotRoot.position.set(0, -0.3 - (ep * 0.28), ep * 0.25);
      break;
  }
  renderer.render(scene, camera);
}
animateThreeJS();
</script>
</body>
</html>
